name: Deploy to GitHub Pages

# Build & publish the static site on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Configures Pages and, if not already enabled, turns it on for this repo.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The whole repo root IS the site (no build step), so upload it as-is.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
